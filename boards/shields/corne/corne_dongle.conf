### DONGLE MODE
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

### DISPLAY CONFIGURATION
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

### NICE OLED UNLOCK
# Esta linha é obrigatória para habilitar os widgets abaixo
CONFIG_SHIELD_NICE_CUSTOM=y

### NICE OLED WIDGETS
CONFIG_NICE_OLED_WIDGET_STATUS=y
CONFIG_NICE_OLED_WIDGET_WPM=y
# Removi a linha da bateria que deu erro de 'undefined' e usei a correta do módulo
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y

### I2C & ENCODER
CONFIG_I2C=y
CONFIG_I2C_NRFX=y
# Desativei o EC11 pois o log indicou que não há encoder definido no seu hardware
CONFIG_EC11=n
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=n

### DONGLE BATTERY OPTIONS
CONFIG_BT_BAS=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

### MOUSE & LAYERS
CONFIG_ZMK_MOUSE=y### DONGLE MODE
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

### DISPLAY & NICE OLED CONFIGURATION
CONFIG_ZMK_DISPLAY=y
# Desativa a tela padrão para usar a do Nice OLED
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Ativa os widgets específicos do módulo Nice OLED
CONFIG_NICE_OLED_WIDGET_STATUS=y
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_NICE_OLED_WIDGET_BATTERY=y

# Mantém o Bongo Cat (Certifique-se de que o módulo joelspadin está no west.yml)
CONFIG_ZMK_WIDGET_BONGO_CAT=n

### I2C CONFIGURATION (nRF52)
CONFIG_I2C=y
CONFIG_I2C_NRFX=y
# Removido símbolo inválido STRATIX10 para evitar erro de build

### ENCODER (EC11)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

### DONGLE BATTERY OPTIONS
CONFIG_BT_BAS=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

### MSL (Mouse Keys / Layer Design)
# Ativa suporte para as camadas que você configurou no protocolo Layer Design
CONFIG_ZMK_MOUSE=y
