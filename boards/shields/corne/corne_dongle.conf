### 1. DONGLE MODE (CENTRAL)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

### 2. DISPLAY & HARDWARE (SH1106 COMPAT)
CONFIG_ZMK_DISPLAY=y
# Desativa a tela padrão para o Bongo Cat do módulo aparecer
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_26=y
CONFIG_LV_Z_VDB_SIZE=64

# O segredo para 1.3" no ZMK v0.3: Habilita o SSD1306 no Kconfig, 
# mas o Overlay (que já está certo) cuida de carregar os comandos SH1106.
CONFIG_SSD1306=y

### 3. CONFIGURAÇÕES DO MÓDULO DONGLE_DISPLAY (ENGLMAXI)
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y
CONFIG_ZMK_DONGLE_DISPLAY_WPM=y
CONFIG_ZMK_DONGLE_DISPLAY_BONGO_CAT=n
CONFIG_ZMK_DONGLE_DISPLAY_MAC_MODIFIERS=n

CONFIG_ZMK_DONGLE_DISPLAY_LAYER_TEXT_ALIGN="right"





### 4. MONITORAMENTO DE BATERIA (LÓGICA SPLIT)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

### 5. RECURSOS ADICIONAIS
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
