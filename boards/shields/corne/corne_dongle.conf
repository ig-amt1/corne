### DONGLE MODE (CORNE SPLIT)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

### DISPLAY CONFIGURATION (ESTÁVEL)
CONFIG_ZMK_DISPLAY=y
# Desativa a tela padrão do Zephyr para não conflitar com widgets customizados
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

### BATTERY CONFIG (BUSCA O NÍVEL DAS DUAS METADES)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

### WIDGETS DE STATUS
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

### I2C & HARDWARE (PARA O SH1106)
CONFIG_I2C=y
CONFIG_I2C_NRFX=y

# Desativando Encoders e Kscan (Dongle não possui teclas/rotativos físicos)
CONFIG_EC11=n
CONFIG_ZMK_KSCAN_GPIO_DRIVER=n

### MOUSE KEYS (PROTOCOLO LAYER DESIGN)
CONFIG_ZMK_MOUSE=y
