### 1. DONGLE MODE (CENTRAL)
# Permite conectar as duas metades ao dongle
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

### 2. DISPLAY & HARDWARE (SH1106)
CONFIG_ZMK_DISPLAY=y
CONFIG_I2C=y
CONFIG_I2C_NRFX=y
# Garante que o ZMK use a tela de status principal
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_INVERT=n
# Desativa WPM para evitar bugs gráficos no SH1106
CONFIG_ZMK_WIDGET_WPM_STATUS=n

### 3. MONITORAMENTO DE BATERIA (SPLIT)
# Ativa a busca de bateria das metades via Bluetooth
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# Centraliza os dados para o display
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
# Tempo de atualização (60s poupa bateria das metades)
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

### 4. RECURSOS ADICIONAIS
# Protocolo Layer Design (Mouse Keys)
CONFIG_ZMK_MOUSE=y
# Suporte ao ZMK Studio (Configuração via interface)
CONFIG_ZMK_STUDIO=y

### 5. CONFIGURAÇÃO DE WIDGETS (MÓDULO ENGLMAXI)
# Se o build der erro de "undefined symbol", coloque um '#' na linha abaixo
#CONFIG_DONGLE_DISPLAY_WIDGET_STATUS=y

# Desativa o widget padrão para não sobrepor o do módulo customizado
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n### DONGLE MODE (CORNE SPLIT)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

### DISPLAY & HARDWARE (SH1106)
CONFIG_ZMK_DISPLAY=y
CONFIG_I2C=y
CONFIG_I2C_NRFX=y

### BATTERY CONFIG (MONITORAMENTO DAS METADES)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

### MOUSE KEYS (PROTOCOLO LAYER DESIGN)
CONFIG_ZMK_MOUSE=y

### ZMK STUDIO (OPCIONAL - JÁ QUE VOCÊ USA O SNIPPET)
CONFIG_ZMK_STUDIO=y

# NOTA: O símbolo DONGLE_DISPLAY_WIDGET_STATUS foi removido para evitar erro de build.
# Se o seu módulo customizado não for carregado via west.yml, o ZMK usará a tela padrão.

# Força o driver correto e desativa o padrão do SSD1306
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Se a imagem estiver bugada, tente estas duas linhas:
CONFIG_ZMK_DISPLAY_INVERT=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n # Às vezes o widget de WPM corrompe o buffer no SH1106

### MONITORAMENTO DE BATERIA (LÓGICA SPLIT)
# Busca os dados das metades via Bluetooth
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# Centraliza os dados no Dongle
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
# Atualiza a cada 60 segundos
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

### ATIVAÇÃO DO WIDGET ENGLMAXI (DONGLE DISPLAY)
# Ativa o widget customizado do módulo que você importou no west
#CONFIG_DONGLE_DISPLAY_WIDGET_STATUS=y

# IMPORTANTE: Desative outros widgets para evitar sobreposição
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
#CONFIG_NICE_OLED_WIDGET_STATUS=n
# Se o Mario estiver aparecendo e você não quiser, desative:
# CONFIG_ZMK_WIDGET_PERIPHERAL_STATUS=n
