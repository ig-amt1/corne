### DONGLE MODE (CORNE SPLIT)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

### DISPLAY & HARDWARE (SH1106)
CONFIG_ZMK_DISPLAY=y
CONFIG_I2C=y
CONFIG_I2C_NRFX=y

### BATTERY CONFIG (MONITORAMENTO DAS METADES)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

### MOUSE KEYS (PROTOCOLO LAYER DESIGN)
CONFIG_ZMK_MOUSE=y

### ZMK STUDIO (OPCIONAL - JÁ QUE VOCÊ USA O SNIPPET)
CONFIG_ZMK_STUDIO=y

# NOTA: O símbolo DONGLE_DISPLAY_WIDGET_STATUS foi removido para evitar erro de build.
# Se o seu módulo customizado não for carregado via west.yml, o ZMK usará a tela padrão.

# Força o driver correto e desativa o padrão do SSD1306
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Se a imagem estiver bugada, tente estas duas linhas:
CONFIG_ZMK_DISPLAY_INVERT=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n # Às vezes o widget de WPM corrompe o buffer no SH1106
